name: YouTube SEO Agent

on:
  schedule:
    - cron: '*/15 * * * *'   # Runs every 15 minutes — agent decides wait/skip
  workflow_dispatch:           # Allow manual trigger anytime

concurrency:
  group: youtube-seo-agent    # Prevent parallel runs
  cancel-in-progress: false   # Don't cancel running job; queue the next one

permissions:
  contents: write              # Required to commit upload_state.json back to repo

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30        # Increased for potential sleep/wait logic

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run YouTube SEO Agent
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_BASE_URL: ${{ secrets.NVIDIA_BASE_URL }}
          NVIDIA_MODEL: ${{ secrets.NVIDIA_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          IST_TIMEZONE: Asia/Kolkata
        run: python src/main.py
